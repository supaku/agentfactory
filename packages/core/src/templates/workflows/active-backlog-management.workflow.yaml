# ─── Active Backlog Management Workflow ─────────────────────────────────────
# Scheduled workflow (REN-1300) that orchestrates the PM agent loop:
#   backlog-groomer → outcome-auditor → improvement-loop → operational-scanner
#
# Runs on haiku/sonnet only — no Opus. Tenants opt in per project via
#   .agentfactory/config.yaml: pmWorkflows.activeBacklogManagement.enabled: true
#
# apiVersion: v2 — enables inter-node output piping.
# Cross-node references use {{ nodes.<name>.output.<key> }} syntax.
# Intra-node references (within a single node's step sequence) use
# {{ steps.<id>.output.<key> }} as described in 016-workflow-engine.md.
#
# References: 012-product-management-agents.md §"Active backlog management as a workflow"
#             016-workflow-engine.md §"Grammar"

apiVersion: v2
kind: WorkflowDefinition
metadata:
  name: active-backlog-management
  description: >
    Cron-scheduled PM agent loop. Chains backlog-groomer → outcome-auditor →
    improvement-loop in sequence, each node consuming the output of the prior via
    {{ nodes.<name>.output.<key> }} inter-node piping. Operational Scanner node
    (operational-scanner-step) is a placeholder pending REN-1328.
    All agents run on haiku or sonnet — never Opus.
    Tenant opt-in: .agentfactory/config.yaml pmWorkflows.activeBacklogManagement.enabled

# ─── Triggers ────────────────────────────────────────────────────────────────
# Default: hourly cron. Tenants override the schedule via
#   .agentfactory/config.yaml: pmWorkflows.activeBacklogManagement.schedule
#
# The schedule field here is the compiled-in default; deployment tooling
# substitutes it at workflow registration time if the tenant has provided
# an override.

triggers:
  - name: cron-hourly
    type: schedule
    schedule: "0 * * * *"   # every hour — configurable per project via tenant config

  - name: manual-trigger
    type: manual

# ─── Providers ───────────────────────────────────────────────────────────────

providers:
  - name: pm-agent
    type: claude
    config:
      # haiku for cheap triage steps; caller may escalate to sonnet for synthesis.
      # Opus is explicitly excluded per 012 PM agent pattern.
      model: claude-haiku-4-5-20250929

  - name: tracker
    type: linear

# ─── Config ──────────────────────────────────────────────────────────────────

config:
  # Maps project names to repository paths — consumed by agent steps that
  # need a projectPath to scope codebase lookups.
  projectMapping: {}

# ─── Nodes ───────────────────────────────────────────────────────────────────
# Nodes execute in declaration order (sequential for this workflow).
# Cross-node piping uses {{ nodes.<name>.output.<key> }} so the engine can
# thread outputs from one PM agent step into the next.

nodes:
  # ── Step 1: Backlog Groomer ─────────────────────────────────────────────
  # Processes one icebox issue per invocation: discard / refine / escalate-human.
  # Stale issues (> staleDays days) flagged with pm:stale.
  # Must NOT create Linear sub-issues per 001 Principle 1.
  - name: backlog-groomer-step
    description: >
      Grooms the icebox: evaluates one issue per cycle and takes a disposition
      (discard, refine, or escalate-human). Stale detection included.
    provider: pm-agent
    steps:
      - id: run-backlog-groomer
        action: spawn-session
        with:
          agentId: backlog-groomer
          workType: backlog-groomer
          project: "{{ trigger.project }}"
          # Forward any project-level context so the groomer can scope the run
          context: "Scheduled active-backlog-management run. Project: {{ trigger.project }}"
        output:
          linearStateDigest:
            type: json
            description: Summary of Linear state changes made by the groomer
            required: false
      - id: post-groomer-status
        action: tracker.create-comment
        when: "{{ steps.run-backlog-groomer.output.linearStateDigest }}"
        with:
          # Post a brief status comment on the project issue if state changed
          body: "Backlog groomer cycle complete. Changes: {{ steps.run-backlog-groomer.output.linearStateDigest }}"
    outputs:
      linearStateDigest:
        type: json
        description: >
          Linear state digest from the groomer: labels applied, issues closed/flagged.
          Consumed by outcome-auditor-step via {{ nodes.backlog-groomer-step.output.linearStateDigest }}.
        required: false

  # ── Step 2: Outcome Auditor ─────────────────────────────────────────────
  # Reads recently accepted issues and audits whether the delivered work
  # matches original intent. Authors follow-up issues for gaps.
  # Consumes the groomer's linearStateDigest to focus its lookback window.
  - name: outcome-auditor-step
    description: >
      Audits recently accepted issues against their acceptance criteria.
      Tags issues audit:clean or audit:has-followups; authors follow-up issues
      for gaps found. Consumes groomer output via cross-node piping.
    provider: pm-agent
    steps:
      - id: run-outcome-auditor
        action: spawn-session
        with:
          agentId: outcome-auditor
          workType: outcome-auditor
          project: "{{ trigger.project }}"
          # Cross-node pipe: consume groomer's Linear-state digest
          groomerDigest: "{{ nodes.backlog-groomer-step.output.linearStateDigest }}"
          context: >
            Scheduled active-backlog-management run. Prior step: backlog-groomer.
            Groomer digest: {{ nodes.backlog-groomer-step.output.linearStateDigest }}.
            Project: {{ trigger.project }}
        output:
          auditSummary:
            type: json
            description: Count of issues audited, clean, and with follow-ups
            required: false
      - id: post-auditor-status
        action: tracker.create-comment
        when: "{{ steps.run-outcome-auditor.output.auditSummary }}"
        with:
          body: "Outcome auditor cycle complete. Summary: {{ steps.run-outcome-auditor.output.auditSummary }}"
    outputs:
      auditSummary:
        type: json
        description: >
          Audit summary: total audited, clean count, follow-up count + IDs.
          Consumed by improvement-loop-step via {{ nodes.outcome-auditor-step.output.auditSummary }}.
        required: false

  # ── Step 3: Improvement Loop ────────────────────────────────────────────
  # Reads recent session outcomes and authors meta-issues about systemic
  # patterns. Hard caps: at most 5 issues per cycle; each must cite >= 3 cases.
  - name: improvement-loop-step
    description: >
      Detects systemic patterns across recent accepted/rejected sessions and
      authors meta-issues (tagged meta:improvement + subsystem:<name>).
      At most 5 issues per cycle; each must cite >= 3 specific failure cases.
      Consumes audit output via cross-node piping.
    provider: pm-agent
    steps:
      - id: run-improvement-loop
        action: spawn-session
        with:
          agentId: improvement-loop
          workType: improvement-loop
          project: "{{ trigger.project }}"
          # Cross-node pipe: consume auditor's summary
          auditSummary: "{{ nodes.outcome-auditor-step.output.auditSummary }}"
          context: >
            Scheduled active-backlog-management run. Prior steps: backlog-groomer,
            outcome-auditor. Audit summary: {{ nodes.outcome-auditor-step.output.auditSummary }}.
            Project: {{ trigger.project }}
        output:
          improvementSummary:
            type: json
            description: Patterns found and meta-issues authored
            required: false
      - id: post-improvement-status
        action: tracker.create-comment
        when: "{{ steps.run-improvement-loop.output.improvementSummary }}"
        with:
          body: "Improvement loop cycle complete. Summary: {{ steps.run-improvement-loop.output.improvementSummary }}"
    outputs:
      improvementSummary:
        type: json
        description: >
          Improvement loop summary: patterns found, meta-issues authored (IDs + titles).
        required: false

  # ── Step 4: Operational Scanner (deferred — REN-1328) ──────────────────
  # TODO(REN-1328): Operational Scanner agent is not yet shipped.
  # When REN-1328 lands, replace this placeholder node with:
  #
  #   - name: operational-scanner-step
  #     description: Scans Sentry, Vercel logs, CI runs and produces actionable issues.
  #     provider: pm-agent
  #     steps:
  #       - id: run-operational-scanner
  #         action: spawn-session
  #         with:
  #           agentId: operational-scanner
  #           workType: operational-scanner
  #           project: "{{ trigger.project }}"
  #           improvementSummary: "{{ nodes.improvement-loop-step.output.improvementSummary }}"
  #
  # For now this node records a deferred status via a comment-only step.
  # No spawn-session — operational-scanner agent does not exist yet.
  - name: operational-scanner-step
    description: >
      Placeholder for Operational Scanner (REN-1328 deferred).
      Records a skipped status; replace with a real spawn-session step once
      the operational-scanner agent ships (REN-1328).
    provider: pm-agent
    # TODO(REN-1328): When conditional node support arrives and the agent ships,
    # add:  when: "{{ featureFlags.operationalScannerShipped }}"
    steps:
      - id: operational-scanner-placeholder
        action: tracker.create-comment
        # Intentional no-op placeholder. Replaced entirely when REN-1328 ships.
        with:
          body: >
            Active Backlog Management: operational-scanner step deferred (REN-1328 pending).
            Steps completed this cycle: backlog-groomer, outcome-auditor, improvement-loop.

# ─── v1.1 backwards compatibility (phases / transitions / escalation) ────────
# These sections are present so the workflow validates against the
# AnyWorkflowDefinitionSchema discriminated union and can be introspected
# by tooling that still reads v1.1 phase lists.

phases:
  - name: backlog-groomer
    template: backlog-groomer
  - name: outcome-auditor
    template: outcome-auditor
  - name: improvement-loop
    template: improvement-loop

transitions: []

escalation:
  ladder:
    - cycle: 1
      strategy: normal
    - cycle: 2
      strategy: escalate-human
  circuitBreaker:
    # Each PM agent step is cheap; allow up to 4 total retries per run
    # before escalating to human. Sub-agents handle their own retry logic.
    maxSessionsPerIssue: 4
    maxSessionsPerPhase: 2
