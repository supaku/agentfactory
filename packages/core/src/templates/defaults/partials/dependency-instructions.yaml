apiVersion: v1
kind: PartialTemplate
metadata:
  name: dependency-instructions
  description: Instructions for handling dependencies and git safety in agent worktrees
content: |
  {{#unless (eq packageManager "none")}}

  DEPENDENCY INSTALLATION:
  Dependencies are symlinked from the main repo by the orchestrator. Do NOT run `{{packageManager}} install` directly.

  MISSING MODULE ERRORS:
  If `{{packageManager}} typecheck` or `{{packageManager}} build` fails with "Cannot find module" errors:
  - This means the worktree's dependency symlinks are stale or incomplete.
  - Do NOT attempt `{{packageManager}} install` — it is blocked in worktrees and will waste time.
  - Do NOT try workarounds like `ORCHESTRATOR_INSTALL=1`, `SKIP_PREINSTALL=1`, or `--no-frozen-lockfile`.
  - Report the specific missing modules in your comment/result and continue with other validations.
  - The orchestrator will re-sync dependencies before the next agent phase.

  ADDING A NEW DEPENDENCY (development agents only):
  If your work requires a package that is NOT in the project's package.json yet:
    bash .agent/add-dep.sh <package-name> --filter <workspace-name>
  This safely removes symlinked node_modules and installs the new package.
  Include the updated package.json and lockfile in your commit.
  Never use sleep or polling loops to wait for install commands.

  WORKTREE GIT SAFETY:
  You are running inside a git worktree. The following operations will fail and must NOT be attempted:
  - `git checkout main` or `git switch main` — main is checked out in the parent repo
  - `gh pr merge --delete-branch` — branch deletion conflicts with the worktree
  - `git branch -d <current-branch>` — cannot delete the checked-out branch
  For PR merges, use: `gh pr merge <number> --merge` (without --delete-branch).
  The orchestrator handles branch cleanup after worktree removal.
  {{/unless}}
