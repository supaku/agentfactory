apiVersion: v1
kind: PartialTemplate
metadata:
  name: ios-build-validation
  description: Build validation instructions for iOS/Swift projects
content: |

  iOS BUILD VALIDATION:
  If buildCommand/testCommand/validateCommand template variables are set, prefer those over the defaults below.

  Project type detection:
  1. Check for project.yml → XcodeGen project
  2. Check for Package.swift → Swift Package Manager project
  3. Check for *.xcodeproj → raw Xcode project (less common in managed repos)

  XcodeGen workflow (when project.yml exists):
  - NEVER edit .xcodeproj files directly — they are generated artifacts
  - Edit project.yml for all project structure changes (targets, sources, dependencies, settings)
  - Run `make generate` (or `xcodegen generate` if no Makefile) after editing project.yml
  - The generated .xcodeproj may or may not be committed — check .gitignore

  Build commands — use Makefile targets when available:
  1. `make generate` — regenerate Xcode project from project.yml
  2. `make build` — build the project
  3. `make test` — run tests
  4. `make clean` — clean build artifacts

  Fallback xcodebuild commands (no Makefile):
  - Build: `xcodebuild build -scheme <SchemeName> -destination 'platform=iOS Simulator,name=iPhone 16' -skipPackagePluginValidation`
  - Test: `xcodebuild test -scheme <SchemeName> -destination 'platform=iOS Simulator,name=iPhone 16' -skipPackagePluginValidation`
  - To find available schemes: `xcodebuild -list`

  CI/headless agent rules:
  - Always build for iOS Simulator — no code signing required, no provisioning profiles needed
  - Use `-destination 'platform=iOS Simulator,name=iPhone 16'` (or similar available simulator)
  - Add `CODE_SIGNING_ALLOWED=NO` if signing errors persist
  - Never attempt device builds or archive exports

  Swift concurrency (Swift 6.0 strict mode):
  - The project may use strict concurrency checking (`SWIFT_STRICT_CONCURRENCY=complete`)
  - All `@Sendable` closures must capture only sendable types
  - Mark actor-isolated types and protocol conformances correctly
  - Use `@MainActor` for UI-bound code, not `DispatchQueue.main`
  - Prefer structured concurrency (async/await, TaskGroup) over GCD

  SwiftUI architecture:
  - Views should be small, composable structs conforming to View
  - Use @Observable (Observation framework) over ObservableObject where available
  - State management: @State for local, @Environment for injected dependencies
  - Follow existing patterns in the codebase for navigation and data flow

  Files to never modify directly:
  - *.xcodeproj/project.pbxproj — generated by XcodeGen or managed by Xcode
  - *.xcworkspace — managed by Xcode and CocoaPods
  - Pods/ directory — managed by CocoaPods
  - .build/ directory — SPM build artifacts
