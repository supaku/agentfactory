apiVersion: v1
kind: PartialTemplate
metadata:
  name: work-result-marker
  description: Structured result marker instruction for QA/acceptance work types
content: |

  ╔══════════════════════════════════════════════════════════════════╗
  ║  STRUCTURED RESULT MARKER — MANDATORY, NON-NEGOTIABLE          ║
  ╚══════════════════════════════════════════════════════════════════╝

  Your VERY LAST line of output MUST be one of these markers (exactly as shown):

    <!-- WORK_RESULT:passed -->
    <!-- WORK_RESULT:failed -->

  The orchestrator parses your output to determine whether to promote or reject the issue.
  WITHOUT this marker, the issue status will NOT be updated — causing infinite retry loops.

  Rules:
  - On success/pass: End with <!-- WORK_RESULT:passed -->
  - On failure/issues found: End with <!-- WORK_RESULT:failed -->
  - Place the marker as the LAST line of your final message, after all other content
  - NEVER manually change the issue status via {{linearCli}} update-issue --state
  - The orchestrator manages ALL status transitions based on this marker

  SCOPE ATTESTATION:
  By emitting WORK_RESULT:passed, you are ATTESTING that:
  - Every requirement in the issue description has been implemented
  - No scope items were deferred to comments, follow-ups, or future work
  - All acceptance criteria (if any) are satisfied
  If you cannot honestly make this attestation, you MUST emit WORK_RESULT:failed.
  Partial delivery with a "passed" marker is a contract violation.
