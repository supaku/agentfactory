apiVersion: v1
kind: WorkflowTemplate
metadata:
  name: backlog-creation
  description: Create backlog issues from researched story
  workType: backlog-creation

tools:
  allow:
    - shell: "pnpm af-linear *"
  disallow:
    - user-input

prompt: |
  Create backlog issues from the researched story {{identifier}}.
  Read the issue description, identify distinct work items, classify each as bug/feature/chore,
  and create appropriately scoped Linear issues.
  Choose the correct issue structure based on the work:
  - Sub-issues (--parentId): When work is a single concern with sequential/parallel phases sharing context and dependencies. Create sub-issues in Icebox (--state "Icebox") so they stay grouped with the parent. The user will promote the parent to Backlog when ready, and sub-issues follow. Add blocking relations (--type blocks) between sub-issues to define execution order for the coordinator.
  - Independent issues (--type related): When items are unrelated work in different codebase areas with no shared context. Create in Icebox (--state "Icebox"). Source stays in Icebox.
  - Single issue rewrite: When scope is atomic (single concern, ≤3 files, no phases). Rewrite source in-place, keep in Icebox.
  IMPORTANT: When creating multiple issues (sub-issues or independent), always add "related" links between them AND blocking relations where one step depends on another. This informs sub-agents and the coordinator of execution order.
  Do NOT wait for user approval - create issues automatically.

  SCOPE FENCING (critical for preventing out-of-scope changes):
  Every sub-issue description MUST include a "Scope Constraints" section at the bottom:
  - List the specific files and functions to modify — nothing else
  - Include: "DO NOT modify, remove, or rename any existing types, exports, enum members, or
    union members unless explicitly required by this sub-issue's acceptance criteria"
  - Include: "DO NOT make 'cleanup' or 'improvement' changes to surrounding code"
  This prevents development agents from making breaking changes outside their remit. Agents that
  add a new value to a union type should NEVER remove existing values in the same change.

  CROSS-PACKAGE DEPENDENCY AWARENESS (monorepo):
  When a sub-issue involves importing types or functions from another workspace package:
  - Add an acceptance criterion: "Verify that `<source-package>` is declared as a dependency
    in `<consuming-package>/package.json`. If not, add it as a workspace dependency."
  - Example: If sub-issue imports `ToolCategory` from `@agentfactory/core` into `@renseiai/plugin-linear`,
    the AC must include: "Add `@agentfactory/core: workspace:*` to `packages/linear/package.json` dependencies"
  Missing cross-package dependencies cause CI typecheck failures that require full refinement cycles to fix.

  EXHAUSTIVE TYPE COVERAGE:
  When a sub-issue adds a new member to a union type, enum, or discriminated union:
  - Search the codebase for ALL switch/case statements, exhaustive checks, and mapping objects
    that reference that type (use code intelligence tools or grep)
  - List EVERY file that needs a corresponding update in the sub-issue description
  - Add acceptance criterion: "All exhaustive switch/case/mapping statements for `<TypeName>`
    are updated to handle the new member. Run `pnpm typecheck` to verify."
  Missing switch cases cause TS2454 errors that require full refinement cycles to fix.
  {{> partials/code-intelligence-instructions}}{{> partials/cli-instructions}}
  {{#if mentionContext}}

  Additional context from the user's mention:
  {{mentionContext}}
  {{/if}}
