apiVersion: v1
kind: WorkflowTemplate
metadata:
  name: qa
  description: Validate implementation against acceptance criteria
  workType: qa

tools:
  allow:
    - shell: "pnpm *"
    - shell: "gh pr *"
    - shell: "pnpm af-linear *"
  disallow:
    - user-input

prompt: |
  QA {{identifier}}.
  Validate the implementation against acceptance criteria.
  Run tests, check for regressions, verify the PR meets requirements.

  {{#if buildCommand}}
  Build: `{{buildCommand}}`
  {{/if}}
  {{#if testCommand}}
  Test: `{{testCommand}}`
  {{/if}}
  {{#if validateCommand}}
  Validate: `{{validateCommand}}`
  {{/if}}

  {{#if qualityBaseline}}
  BASELINE-AWARE FAILURE ATTRIBUTION:
  The development agent was given this quality baseline (captured from main):
  - Tests: {{qualityBaseline.tests.failed}} pre-existing failures out of {{qualityBaseline.tests.total}} total
  - Typecheck errors: {{qualityBaseline.typecheckErrors}}
  - Lint errors: {{qualityBaseline.lintErrors}}
  If the current branch has MORE failures than this baseline, the development agent made
  things worse — this is a HARD FAIL. If failures are equal to or less than baseline,
  they are pre-existing and should NOT cause QA failure (unless the issue specifically
  requires fixing them).
  {{/if}}

  IMPORTANT CONSTRAINTS:
  - This is READ-ONLY validation — do NOT make code changes, git commits, or fix issues yourself.
  - If you find problems, report them and emit WORK_RESULT:failed. Do NOT attempt to fix them.
  - NEVER run {{linearCli}} update-issue --state. The orchestrator manages ALL issue status transitions based on your WORK_RESULT marker. Manually changing status causes infinite loops.
  - Only use {{linearCli}} for: get-issue, list-comments, create-comment

  HARD FAIL RULE — BUILD FAILURES:
  If {{#if buildCommand}}`{{buildCommand}}`{{else}}`{{packageManager}} typecheck` or `{{packageManager}} build`{{/if}} exits with a non-zero exit code, you MUST report <!-- WORK_RESULT:failed --> immediately.
  Do NOT rationalize, skip, or explain away build/typecheck failures (e.g., "will resolve on merge").
  A failing build is an automatic QA failure regardless of any other results.

  HARD FAIL RULE — MERGE CONFLICTS:
  Check PR mergeability: `gh pr view <PR_NUMBER> --json mergeable,mergeStateStatus`
  If the PR has merge conflicts (mergeable=CONFLICTING or mergeStateStatus=DIRTY), you MUST
  report <!-- WORK_RESULT:failed --> immediately with a clear message listing the conflicting files.
  Do NOT pass QA with a "caveat" about merge conflicts. A non-mergeable PR cannot be delivered —
  passing it wastes an entire acceptance session that will predictably fail on the same conflicts.
  Merge conflicts are an automatic QA failure regardless of implementation correctness.

  {{> partials/dependency-instructions}}
  {{> partials/large-file-instructions}}{{> partials/code-intelligence-instructions}}{{> partials/cli-instructions}}
  {{#if mentionContext}}

  Additional context from the user's mention:
  {{mentionContext}}
  {{/if}}
  {{> partials/work-result-marker}}
