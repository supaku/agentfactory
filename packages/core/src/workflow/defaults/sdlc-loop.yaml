# ─── v2 SDLC Loop Reference Spec ─────────────────────────────────────────────
# Canonical v2 WorkflowDefinition that models the full SDLC loop using v2
# constructs: triggers, providers, config, nodes with multi-step sequences,
# and {{ }} template expressions.
#
# This file exercises every v2 section and serves as the validation target for
# the v2 schema (SUP-1513).

apiVersion: v2
kind: WorkflowDefinition
metadata:
  name: sdlc-loop
  description: >
    Event-driven SDLC loop modelling the full development lifecycle:
    research → backlog → development → QA → acceptance → refinement.
    Uses v2 constructs for trigger-based dispatch and multi-step provider nodes.

# ─── Triggers ────────────────────────────────────────────────────────────────
# Declares events that can initiate workflow execution. Each trigger defines
# a source, event type, and optional payload filter.

triggers:
  - name: issue-moved-to-backlog
    type: webhook
    source: linear
    event: issue.status_changed
    filter:
      status: Backlog

  - name: issue-finished
    type: webhook
    source: linear
    event: issue.status_changed
    filter:
      status: Finished

  - name: issue-delivered
    type: webhook
    source: linear
    event: issue.status_changed
    filter:
      status: Delivered

  - name: issue-rejected
    type: webhook
    source: linear
    event: issue.status_changed
    filter:
      status: Rejected

  - name: nightly-backlog-sweep
    type: schedule
    schedule: "0 2 * * *"

  - name: manual-trigger
    type: manual

# ─── Providers ───────────────────────────────────────────────────────────────
# Declares external services that nodes can reference. Each provider has a
# unique name (used in node.provider) and a type identifying the plugin.

providers:
  - name: coding-agent
    type: claude
    config:
      model: claude-sonnet-4-5-20250929

  - name: qa-agent
    type: claude
    config:
      model: claude-sonnet-4-5-20250929

  - name: tracker
    type: linear

  - name: vcs
    type: github

# ─── Config ──────────────────────────────────────────────────────────────────
# Workspace-level configuration. projectMapping maps project names to
# repository paths; additional keys are extensible.

config:
  projectMapping:
    AgentFactory: ./packages/core
    Dashboard: ./packages/dashboard

# ─── Nodes ───────────────────────────────────────────────────────────────────
# v2 action-based nodes with multi-step sequences. Each node can reference a
# provider, contain ordered steps with {{ }} interpolation, and use conditional
# execution via `when` expressions.

nodes:
  # ── Research Phase ─────────────────────────────────────────────────────────
  - name: research
    description: Flesh out sparse Icebox issues with research
    provider: coding-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Icebox' }}"
    steps:
      - id: investigate
        action: spawn-session
        with:
          template: research
          issue: "{{ trigger.issue.identifier }}"
      - id: update-status
        action: tracker.update-issue
        with:
          issueId: "{{ trigger.issue.id }}"
          labels:
            - researched

  # ── Backlog Creation Phase ─────────────────────────────────────────────────
  - name: backlog-creation
    description: Create sub-issues from well-researched Icebox stories
    provider: coding-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Icebox' }}"
    steps:
      - id: create-sub-issues
        action: spawn-session
        with:
          template: backlog-creation
          issue: "{{ trigger.issue.identifier }}"
      - id: notify-created
        action: tracker.create-comment
        with:
          issueId: "{{ trigger.issue.id }}"
          body: "Sub-issues created: {{ steps.create-sub-issues.output.subIssueCount }} issues"

  # ── Development Phase ──────────────────────────────────────────────────────
  - name: develop
    description: Implement the feature or fix in an isolated worktree
    provider: coding-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Backlog' }}"
    timeout:
      duration: 2h
      action: escalate
    retry:
      maxAttempts: 3
    steps:
      - id: implement
        action: spawn-session
        with:
          template: development
          issue: "{{ trigger.issue.identifier }}"
          projectPath: "{{ config.projectMapping[trigger.issue.project] }}"
      - id: create-pr
        action: vcs.create-pull-request
        with:
          branch: "{{ steps.implement.output.branch }}"
          title: "{{ trigger.issue.identifier }}: {{ trigger.issue.title }}"
          body: "Resolves {{ trigger.issue.url }}"
      - id: post-pr
        action: tracker.create-comment
        with:
          issueId: "{{ trigger.issue.id }}"
          body: "PR: {{ steps.create-pr.output.prUrl }}"
      - id: transition-finished
        action: tracker.update-issue
        with:
          issueId: "{{ trigger.issue.id }}"
          status: Finished
    outputs:
      prUrl:
        type: url
        required: true
        description: Pull request URL created by the agent
      branch:
        type: string
        description: Git branch name used for development

  # ── QA Phase ───────────────────────────────────────────────────────────────
  - name: qa
    description: Validate the implementation against acceptance criteria
    provider: qa-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Finished' }}"
    steps:
      - id: validate
        action: spawn-session
        with:
          template: qa
          issue: "{{ trigger.issue.identifier }}"
          prUrl: "{{ trigger.issue.prUrl }}"
      - id: report-result
        action: tracker.create-comment
        with:
          issueId: "{{ trigger.issue.id }}"
          body: "QA {{ steps.validate.output.passed and 'passed' or 'failed' }}: {{ steps.validate.output.summary }}"
      - id: transition-qa
        action: tracker.update-issue
        when: "{{ steps.validate.output.passed }}"
        with:
          issueId: "{{ trigger.issue.id }}"
          status: Delivered

  # ── Acceptance Phase ───────────────────────────────────────────────────────
  - name: acceptance
    description: Final acceptance testing before merge
    provider: qa-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Delivered' }}"
    steps:
      - id: accept
        action: spawn-session
        with:
          template: acceptance
          issue: "{{ trigger.issue.identifier }}"
      - id: merge-pr
        action: vcs.merge-pull-request
        when: "{{ steps.accept.output.accepted }}"
        with:
          prUrl: "{{ steps.accept.output.prUrl }}"
      - id: notify-accepted
        action: tracker.create-comment
        with:
          issueId: "{{ trigger.issue.id }}"
          body: "Accepted and merged: {{ steps.merge-pr.output.mergeCommit }}"

  # ── Refinement Phase ───────────────────────────────────────────────────────
  - name: refinement
    description: Address rejection feedback and prepare for retry
    provider: coding-agent
    when: "{{ trigger.event eq 'issue.status_changed' and trigger.filter.status eq 'Rejected' }}"
    retry:
      maxAttempts: 3
      ladder:
        - cycle: 1
          strategy: normal
        - cycle: 2
          strategy: context-enriched
        - cycle: 3
          strategy: decompose
    steps:
      - id: refine
        action: spawn-session
        with:
          template: refinement
          issue: "{{ trigger.issue.identifier }}"
          feedback: "{{ trigger.issue.lastComment }}"
      - id: push-changes
        action: vcs.push-branch
        with:
          branch: "{{ steps.refine.output.branch }}"
      - id: request-re-review
        action: tracker.create-comment
        with:
          issueId: "{{ trigger.issue.id }}"
          body: "Refinement complete — pushed to {{ steps.push-changes.output.branch }}"
      - id: transition-back
        action: tracker.update-issue
        with:
          issueId: "{{ trigger.issue.id }}"
          status: Finished

  # ── Coordination Phase ─────────────────────────────────────────────────────
  - name: coordination
    description: Orchestrate sub-issue execution for parent issues
    provider: coding-agent
    steps:
      - id: coordinate
        action: spawn-session
        with:
          template: coordination
          issue: "{{ trigger.issue.identifier }}"

# ─── Phases (v1.1 backwards compatibility) ───────────────────────────────────
# v2 definitions can include legacy v1.1 phases alongside v2 nodes. The engine
# can dispatch to either based on the transition target.

phases:
  - name: research
    template: research
  - name: development
    template: development
  - name: qa
    template: qa
  - name: acceptance
    template: acceptance
  - name: refinement
    template: refinement
    variants:
      context-enriched: refinement-context-enriched
      decompose: refinement-decompose

# ─── Transitions (v1.1 backwards compatibility) ─────────────────────────────

transitions:
  - from: Icebox
    to: research
    condition: "{{ not researchCompleted }}"
    priority: 10
  - from: Backlog
    to: development
  - from: Finished
    to: qa
  - from: Delivered
    to: acceptance
  - from: Rejected
    to: refinement

# ─── Escalation ─────────────────────────────────────────────────────────────

escalation:
  ladder:
    - cycle: 1
      strategy: normal
    - cycle: 2
      strategy: context-enriched
    - cycle: 3
      strategy: decompose
    - cycle: 4
      strategy: escalate-human
  circuitBreaker:
    maxSessionsPerIssue: 8
    maxSessionsPerPhase: 3
