name: Publish to npm and GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.8.2). Required for manual dispatch.'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm and GitHub Packages
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 22 ships with npm 10.9.x which supports OIDC Trusted Publishers.
      # Do NOT run `npm install -g npm@latest` — npm 11 has a broken
      # promise-retry dependency on GHA runners, and upgrading npm globally
      # can break the OIDC auth flow that setup-node configures.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Remove deprecated always-auth from .npmrc
        run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Extract version from tag or workflow_dispatch input
      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      # Check if version already exists on npm
      - name: Check if version exists on npm
        id: check
        run: |
          if npm view @renseiai/agentfactory@$RELEASE_VERSION version 2>/dev/null; then
            echo "Version $RELEASE_VERSION already exists on npm"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $RELEASE_VERSION does not exist on npm, will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # Update all package versions to match the tag
      - name: Set package versions
        if: steps.check.outputs.should_publish == 'true'
        run: |
          for pkg in packages/linear packages/code-intelligence packages/core packages/server packages/cli packages/nextjs packages/dashboard packages/mcp-server packages/create-app; do
            cd "$pkg"
            npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done

      # Publish packages in dependency order to npm
      # 1. linear (no internal deps)
      # 2. code-intelligence (no internal deps)
      # 3. core (depends on linear)
      # 4. server (depends on core + linear)
      # 5. cli (depends on core + linear + server + code-intelligence)
      # 6. nextjs (depends on core + linear + server)
      # 7. create-app (no internal runtime deps)
      - name: Publish @renseiai/plugin-linear to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/plugin-linear publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-code-intelligence to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-code-intelligence publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-server to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-server publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-cli to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-cli publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-nextjs to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-nextjs publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-dashboard to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-dashboard publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/agentfactory-mcp-server to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-mcp-server publish --no-git-checks --provenance --access public

      - name: Publish @renseiai/create-agentfactory-app to npm
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/create-agentfactory-app publish --no-git-checks --provenance --access public

      # Publish to GitHub Packages
      - name: Setup Node.js for GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@renseiai'

      - name: Remove deprecated always-auth from .npmrc
        if: steps.check.outputs.should_publish == 'true'
        run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - name: Publish @renseiai/plugin-linear to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/plugin-linear publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-code-intelligence to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-code-intelligence publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-server to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-server publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-cli to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-nextjs to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-nextjs publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-dashboard to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-dashboard publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/agentfactory-mcp-server to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/agentfactory-mcp-server publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @renseiai/create-agentfactory-app to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        run: pnpm --filter @renseiai/create-agentfactory-app publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create GitHub Release
      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate and attach SBOMs to release
      - name: Install FOSSA CLI
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

      - name: Generate SBOMs and attribution
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          fossa report attribution --format spdx --project agentfactory > sbom-spdx.json
          fossa report attribution --format cyclonedx --project agentfactory > sbom-cyclonedx.json
          fossa report attribution --project agentfactory > NOTICE
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

      - name: Attach SBOMs to GitHub Release
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            sbom-spdx.json \
            sbom-cyclonedx.json \
            NOTICE \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
