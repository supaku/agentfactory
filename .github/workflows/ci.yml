name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Check dependency licenses
        run: >-
          npx license-checker-rseidelsohn
          --production
          --onlyAllow "$(cat .license-allowlist)"
          --excludePrivatePackages
          --excludePackages "@anthropic-ai/claude-agent-sdk"

  fossa-analyze:
    name: FOSSA Analyze
    runs-on: ubuntu-latest
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - uses: fossas/fossa-action@main
        if: ${{ env.FOSSA_API_KEY != '' }}
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

  fossa-test:
    name: FOSSA Test
    runs-on: ubuntu-latest
    needs: [fossa-analyze]
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - uses: fossas/fossa-action@main
        if: ${{ env.FOSSA_API_KEY != '' }}
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true

  fossa-sbom:
    name: FOSSA SBOM Generation
    runs-on: ubuntu-latest
    needs: [fossa-analyze]
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - name: Install FOSSA CLI
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash

      - name: Generate SPDX SBOM
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --format spdx --project agentfactory > sbom-spdx.json

      - name: Generate CycloneDX SBOM
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --format cyclonedx --project agentfactory > sbom-cyclonedx.json

      - name: Generate attribution document
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --project agentfactory > NOTICE

      - name: Upload SBOM artifacts
        if: ${{ env.FOSSA_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-notices
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
            NOTICE

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  quality-ratchet:
    name: Quality Ratchet
    runs-on: ubuntu-latest
    needs: [build]
    if: hashFiles('.agentfactory/quality-ratchet.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Check quality ratchet
        run: |
          set +e

          # Run typecheck, count errors
          pnpm typecheck 2> typecheck-stderr.txt
          TYPECHECK_EXIT=$?
          TYPECHECK_ERRORS=$(grep -c 'error TS' typecheck-stderr.txt 2>/dev/null || echo 0)

          # Run tests with JSON reporter for counts
          pnpm test -- --reporter=json > test-results.json 2>&1
          TEST_EXIT=$?

          # Parse test results
          TEST_TOTAL=$(node -e "try { const r=require('./test-results.json'); console.log(r.numTotalTests || 0) } catch { console.log(0) }" 2>/dev/null || echo 0)
          TEST_FAILED=$(node -e "try { const r=require('./test-results.json'); console.log(r.numFailedTests || 0) } catch { console.log(0) }" 2>/dev/null || echo 0)

          # Load ratchet thresholds
          MIN_TESTS=$(node -e "const r=JSON.parse(require('fs').readFileSync('.agentfactory/quality-ratchet.json','utf8')); console.log(r.thresholds.testCount.min)")
          MAX_FAILURES=$(node -e "const r=JSON.parse(require('fs').readFileSync('.agentfactory/quality-ratchet.json','utf8')); console.log(r.thresholds.testFailures.max)")
          MAX_TYPE_ERRORS=$(node -e "const r=JSON.parse(require('fs').readFileSync('.agentfactory/quality-ratchet.json','utf8')); console.log(r.thresholds.typecheckErrors.max)")

          echo "Test count: $TEST_TOTAL (min: $MIN_TESTS)"
          echo "Test failures: $TEST_FAILED (max: $MAX_FAILURES)"
          echo "Typecheck errors: $TYPECHECK_ERRORS (max: $MAX_TYPE_ERRORS)"

          FAILED=0
          if [ "$TEST_TOTAL" -lt "$MIN_TESTS" ]; then
            echo "::error::RATCHET VIOLATION: Test count $TEST_TOTAL < minimum $MIN_TESTS"
            FAILED=1
          fi
          if [ "$TEST_FAILED" -gt "$MAX_FAILURES" ]; then
            echo "::error::RATCHET VIOLATION: Test failures $TEST_FAILED > maximum $MAX_FAILURES"
            FAILED=1
          fi
          if [ "$TYPECHECK_ERRORS" -gt "$MAX_TYPE_ERRORS" ]; then
            echo "::error::RATCHET VIOLATION: Typecheck errors $TYPECHECK_ERRORS > maximum $MAX_TYPE_ERRORS"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "Quality ratchet check passed"
