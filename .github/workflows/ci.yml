name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        if: ${{ env.GITLEAKS_LICENSE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
    env:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Check dependency licenses
        run: >-
          npx license-checker-rseidelsohn
          --production
          --onlyAllow "$(cat .license-allowlist)"
          --excludePrivatePackages
          --excludePackages "@anthropic-ai/claude-agent-sdk"

  fossa-analyze:
    name: FOSSA Analyze
    runs-on: ubuntu-latest
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - uses: fossas/fossa-action@main
        if: ${{ env.FOSSA_API_KEY != '' }}
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}

  fossa-test:
    name: FOSSA Test
    runs-on: ubuntu-latest
    needs: [fossa-analyze]
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - uses: fossas/fossa-action@main
        if: ${{ env.FOSSA_API_KEY != '' }}
        with:
          api-key: ${{ secrets.FOSSA_API_KEY }}
          run-tests: true

  fossa-sbom:
    name: FOSSA SBOM Generation
    runs-on: ubuntu-latest
    needs: [fossa-analyze]
    env:
      FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.FOSSA_API_KEY != '' }}

      - name: Install FOSSA CLI
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash

      - name: Generate SPDX SBOM
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --format spdx --project agentfactory > sbom-spdx.json

      - name: Generate CycloneDX SBOM
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --format cyclonedx --project agentfactory > sbom-cyclonedx.json

      - name: Generate attribution document
        if: ${{ env.FOSSA_API_KEY != '' }}
        run: fossa report attribution --project agentfactory > NOTICE

      - name: Upload SBOM artifacts
        if: ${{ env.FOSSA_API_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-notices
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
            NOTICE

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
